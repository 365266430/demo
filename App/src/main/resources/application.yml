server:
  port: 8082

spring:
  application:
    name: legal-document-analysis

  datasource:
    url: jdbc:mysql://localhost:3306/legal_document_analysis?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 26380
      password:
      database: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    model:
      chat: openai
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.2
